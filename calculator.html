<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>CO₂ Rechner</title>
    <link rel="stylesheet" href="style.css">
  
</head>

<body>

<header class="navbar">
    <h1>EcoTrack</h1>
    <nav>
        <a href="index.html">Start</a>
        <a href="calculator.html">Rechner</a>
        <a href="tips.html">Tipps</a>
    </nav>
</header>

<main class="container">

    <h2>CO₂ Rechner</h2>

    <div class="box">

        <label>Transportmittel</label>
        <select id="type">
            <option value="car">Auto</option>
            <option value="train">Zug</option>
            <option value="bus">Bus</option>
            <option value="flight">Flug</option>
        </select>

        <label>Kilometer</label>
        <input type="number" id="distance" placeholder="z.B. 50">

        <button id="calculateBtn">
            CO₂ berechnen
        </button>

        <div class="result" id="result">
            Ergebnis erscheint hier
        </div>

    </div>

</main>

<script src="script.js"></script>
</body>
</html>
